name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.34.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
      - name: Verify feature coverage and intent
        run: pnpm verify:features
  bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.34.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm -r build
      - name: Build example IR
        run: |
          pnpm --filter @echozedlabs/techtree-compiler cli build examples/personal-learning
          pnpm --filter @echozedlabs/techtree-compiler cli build examples/eng-career
          pnpm --filter @echozedlabs/techtree-compiler cli build examples/ai-delivery --profile delivery
      - name: Install Playwright browser
        run: pnpm --filter @echozedlabs/dev-harness exec playwright install --with-deps chromium
      - name: Run executable BDD feature tests
        run: pnpm test:bdd
